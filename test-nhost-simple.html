<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Nhost Connection</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 800px;
            margin: 50px auto;
            padding: 20px;
        }
        .test-box {
            background: #f5f5f5;
            padding: 20px;
            border-radius: 8px;
            margin: 20px 0;
        }
        .success { background: #d4edda; color: #155724; }
        .error { background: #f8d7da; color: #721c24; }
        .info { background: #d1ecf1; color: #0c5460; }
        button {
            background: #4a7c59;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            margin: 5px;
        }
        button:hover {
            background: #3a6c49;
        }
        pre {
            background: #2d3748;
            color: #68d391;
            padding: 15px;
            border-radius: 5px;
            overflow-x: auto;
        }
    </style>
</head>
<body>
    <h1>Nhost Connection Test</h1>
    
    <div class="test-box info">
        <h3>Testing Connection to:</h3>
        <p><strong>Subdomain:</strong> Gousamhitha</p>
        <p><strong>Region:</strong> eu-central-1</p>
        <p><strong>GraphQL:</strong> https://Gousamhitha.eu-central-1.nhost.run/v1/graphql</p>
    </div>

    <button onclick="testConnection()">Test Connection</button>
    <button onclick="testSignup()">Test Signup</button>
    <button onclick="clearResults()">Clear Results</button>

    <div id="results"></div>

    <script type="module">
        import { NhostClient } from 'https://cdn.jsdelivr.net/npm/@nhost/nhost-js@2.2.3/+esm';
        
        window.nhost = new NhostClient({
            subdomain: "Gousamhitha",
            region: "eu-central-1"
        });
        
        addResult('✅ Nhost client initialized', 'success');
    </script>

    <script>
        function addResult(message, type = 'info') {
            const results = document.getElementById('results');
            const box = document.createElement('div');
            box.className = `test-box ${type}`;
            box.innerHTML = `<p>${message}</p>`;
            results.appendChild(box);
        }

        function clearResults() {
            document.getElementById('results').innerHTML = '';
        }

        async function testConnection() {
            addResult('🔍 Testing connection...', 'info');
            
            try {
                // Test 1: Check if Nhost client exists
                if (!window.nhost) {
                    throw new Error('Nhost client not initialized');
                }
                addResult('✅ Nhost client exists', 'success');
                
                // Test 2: Try to fetch from GraphQL endpoint
                const response = await fetch('https://Gousamhitha.eu-central-1.nhost.run/v1/graphql', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        query: '{ __typename }'
                    })
                });
                
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}: ${response.statusText}`);
                }
                
                const data = await response.json();
                addResult('✅ GraphQL endpoint is reachable', 'success');
                addResult(`Response: <pre>${JSON.stringify(data, null, 2)}</pre>`, 'success');
                
                // Test 3: Check auth status
                const isAuth = window.nhost.auth.isAuthenticated();
                addResult(`Auth status: ${isAuth ? 'Logged in' : 'Not logged in'}`, 'info');
                
            } catch (error) {
                addResult(`❌ Connection failed: ${error.message}`, 'error');
                console.error('Connection test error:', error);
            }
        }

        async function testSignup() {
            addResult('🔍 Testing signup...', 'info');
            
            const testEmail = `test${Date.now()}@example.com`;
            const testPassword = 'test123456';
            
            try {
                addResult(`Creating test user: ${testEmail}`, 'info');
                
                const { session, error } = await window.nhost.auth.signUp({
                    email: testEmail,
                    password: testPassword,
                    options: {
                        displayName: 'Test User'
                    }
                });
                
                if (error) {
                    throw new Error(JSON.stringify(error, null, 2));
                }
                
                addResult('✅ Signup successful!', 'success');
                addResult(`User ID: ${window.nhost.auth.getUser()?.id}`, 'success');
                
                // Cleanup - delete test user
                await window.nhost.auth.signOut();
                addResult('✅ Test user logged out', 'info');
                
            } catch (error) {
                addResult(`❌ Signup failed: ${error.message}`, 'error');
                addResult(`<pre>${error.message}</pre>`, 'error');
                console.error('Signup test error:', error);
            }
        }
    </script>
</body>
</html>
