<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Orders Table</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 1200px;
            margin: 40px auto;
            padding: 20px;
        }
        button {
            background: #4a7c59;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 16px;
            margin: 10px 5px;
        }
        pre {
            background: #f5f5f5;
            padding: 15px;
            border-radius: 4px;
            overflow-x: auto;
            white-space: pre-wrap;
        }
        .error { color: #d32f2f; }
        .success { color: #2e7d32; }
    </style>
</head>
<body>
    <h1>Test Orders Table Access</h1>
    
    <button onclick="testOrdersTable()">Test Orders Query</button>
    <button onclick="testWithoutAuth()">Test Without Auth</button>
    
    <div id="result"></div>

    <script src="js/nhost-client-cdn.js"></script>
    <script>
        async function testOrdersTable() {
            const resultDiv = document.getElementById('result');
            resultDiv.innerHTML = '<p>Testing...</p>';
            
            await new Promise(resolve => setTimeout(resolve, 1500));
            
            try {
                const response = await window.nhost.graphql.request(`
                    query {
                        orders {
                            id
                            status
                            total
                            created_at
                        }
                    }
                `);
                
                console.log('Response:', response);
                
                if (response.errors) {
                    resultDiv.innerHTML = `
                        <h2 class="error">❌ GraphQL Error</h2>
                        <pre>${JSON.stringify(response.errors, null, 2)}</pre>
                        <h3>Error Message:</h3>
                        <pre class="error">${response.errors.map(e => e.message).join('\n')}</pre>
                        <h3>Solution:</h3>
                        <p>The orders table is not tracked in Hasura or permissions are not set.</p>
                        <ol>
                            <li>Go to Hasura Console → Data tab</li>
                            <li>Look for "orders" in the left sidebar under "public" schema</li>
                            <li>If you see "Track" button next to it, click it</li>
                            <li>Then go to Permissions tab → user role → select → Set permissions</li>
                        </ol>
                    `;
                } else if (response.data) {
                    const orders = response.data.orders || [];
                    resultDiv.innerHTML = `
                        <h2 class="success">✅ Success!</h2>
                        <p>Found ${orders.length} orders</p>
                        <pre class="success">${JSON.stringify(orders, null, 2)}</pre>
                    `;
                } else {
                    resultDiv.innerHTML = `
                        <h2 class="error">❌ No Data</h2>
                        <pre>${JSON.stringify(response, null, 2)}</pre>
                    `;
                }
            } catch (error) {
                resultDiv.innerHTML = `
                    <h2 class="error">❌ Error</h2>
                    <pre class="error">${error.message}\n\n${error.stack}</pre>
                `;
            }
        }
        
        async function testWithoutAuth() {
            const resultDiv = document.getElementById('result');
            resultDiv.innerHTML = '<p>Testing direct fetch without auth...</p>';
            
            try {
                const response = await fetch('https://mplmzjcwaxqmtyngivxf.hasura.ap-south-1.nhost.run/v1/graphql', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        query: `
                            query {
                                orders {
                                    id
                                    status
                                    total
                                }
                            }
                        `
                    })
                });
                
                const result = await response.json();
                console.log('Direct fetch result:', result);
                
                if (result.errors) {
                    resultDiv.innerHTML = `
                        <h2 class="error">❌ GraphQL Error (No Auth)</h2>
                        <pre>${JSON.stringify(result.errors, null, 2)}</pre>
                        <p>This confirms the orders table needs to be tracked in Hasura.</p>
                    `;
                } else {
                    resultDiv.innerHTML = `
                        <h2 class="success">✅ Direct Fetch Success</h2>
                        <pre>${JSON.stringify(result, null, 2)}</pre>
                    `;
                }
            } catch (error) {
                resultDiv.innerHTML = `
                    <h2 class="error">❌ Fetch Error</h2>
                    <pre>${error.message}</pre>
                `;
            }
        }
    </script>
</body>
</html>
