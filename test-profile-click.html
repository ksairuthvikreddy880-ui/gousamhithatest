<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Profile Click</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        body {
            padding: 50px;
            font-family: Arial, sans-serif;
        }
        .test-section {
            margin: 20px 0;
            padding: 20px;
            border: 2px solid #4a7c59;
            border-radius: 8px;
        }
        .test-button {
            padding: 15px 30px;
            background: #4a7c59;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            margin: 10px;
        }
        .test-button:hover {
            background: #3a6c49;
        }
        #console-log {
            background: #f5f5f5;
            padding: 15px;
            border-radius: 8px;
            margin-top: 20px;
            font-family: monospace;
            font-size: 12px;
            max-height: 300px;
            overflow-y: auto;
        }
        .log-entry {
            margin: 5px 0;
            padding: 5px;
            border-bottom: 1px solid #ddd;
        }
    </style>
</head>
<body>
    <h1>Profile Click Test Page</h1>
    
    <div class="test-section">
        <h2>Test 1: Profile Button (from index.html)</h2>
        <p>This is the actual profile button from your navigation:</p>
        <a href="#" class="nav-item profile-icon-btn" id="profile-btn" style="display: inline-block; padding: 10px; border: 2px solid #4a7c59; border-radius: 8px;">
            <div class="profile-icon-placeholder">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="2"/>
                    <circle cx="12" cy="10" r="3" stroke="currentColor" stroke-width="2"/>
                    <path d="M6.5 18.5C7.5 16.5 9.5 15 12 15C14.5 15 16.5 16.5 17.5 18.5" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                </svg>
            </div>
        </a>
    </div>

    <div class="test-section">
        <h2>Test 2: Direct Modal Open</h2>
        <button class="test-button" onclick="testDirectModalOpen()">Open Modal Directly</button>
        <button class="test-button" onclick="testCloseModal()">Close Modal</button>
    </div>

    <div class="test-section">
        <h2>Test 3: Check Elements</h2>
        <button class="test-button" onclick="checkElements()">Check All Elements</button>
    </div>

    <div id="console-log">
        <strong>Console Log:</strong>
        <div id="log-entries"></div>
    </div>

    <!-- Auth Modal -->
    <div class="auth-modal" id="auth-modal">
        <div class="auth-modal-content">
            <span class="auth-close" onclick="closeAuthModal()">&times;</span>
            
            <div class="auth-tabs">
                <button class="auth-tab active" onclick="switchTab('signin')">Sign In</button>
                <button class="auth-tab" onclick="switchTab('signup')">Sign Up</button>
            </div>

            <div class="auth-form-container active" id="signin-form">
                <h2>Welcome Back</h2>
                <form onsubmit="handleSignIn(event)">
                    <div class="form-group">
                        <label>Email</label>
                        <input type="email" id="signin-email" required>
                    </div>
                    <div class="form-group">
                        <label>Password</label>
                        <input type="password" id="signin-password" required>
                    </div>
                    <div class="auth-message" id="signin-message"></div>
                    <button type="submit" class="btn btn-primary auth-submit">Sign In</button>
                </form>
            </div>

            <div class="auth-form-container" id="signup-form">
                <h2>Create Account</h2>
                <form onsubmit="handleSignUp(event)">
                    <div class="form-group">
                        <label>Full Name</label>
                        <input type="text" id="signup-name" required>
                    </div>
                    <div class="form-group">
                        <label>Email</label>
                        <input type="email" id="signup-email" required>
                    </div>
                    <div class="form-group">
                        <label>Mobile</label>
                        <input type="tel" id="signup-mobile" required>
                    </div>
                    <div class="form-group">
                        <label>Password</label>
                        <input type="password" id="signup-password" required>
                    </div>
                    <div class="form-group">
                        <label>Confirm Password</label>
                        <input type="password" id="signup-confirm" required>
                    </div>
                    <div class="auth-message" id="signup-message"></div>
                    <button type="submit" class="btn btn-primary auth-submit">Create Account</button>
                </form>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="js/profile-handler.js"></script>
    <script type="module" src="js/nhost-client.js"></script>
    <script type="module" src="js/nhost-auth-handler.js"></script>

    <script>
        // Capture console logs
        const logEntries = document.getElementById('log-entries');
        const originalLog = console.log;
        const originalError = console.error;

        function addLog(message, type = 'log') {
            const entry = document.createElement('div');
            entry.className = 'log-entry';
            entry.style.color = type === 'error' ? 'red' : 'black';
            entry.textContent = `[${new Date().toLocaleTimeString()}] ${message}`;
            logEntries.appendChild(entry);
            logEntries.scrollTop = logEntries.scrollHeight;
        }

        console.log = function(...args) {
            originalLog.apply(console, args);
            addLog(args.join(' '), 'log');
        };

        console.error = function(...args) {
            originalError.apply(console, args);
            addLog(args.join(' '), 'error');
        };

        // Test functions
        function testDirectModalOpen() {
            console.log('Testing direct modal open...');
            const modal = document.getElementById('auth-modal');
            if (modal) {
                modal.classList.add('active');
                console.log('✅ Modal opened successfully');
            } else {
                console.error('❌ Modal not found');
            }
        }

        function testCloseModal() {
            console.log('Testing modal close...');
            if (typeof closeAuthModal === 'function') {
                closeAuthModal();
                console.log('✅ Modal closed successfully');
            } else {
                console.error('❌ closeAuthModal function not found');
            }
        }

        function checkElements() {
            console.log('Checking elements...');
            
            const profileBtn = document.getElementById('profile-btn');
            console.log('Profile button:', profileBtn ? '✅ Found' : '❌ Not found');
            
            const authModal = document.getElementById('auth-modal');
            console.log('Auth modal:', authModal ? '✅ Found' : '❌ Not found');
            
            const signinForm = document.getElementById('signin-form');
            console.log('Signin form:', signinForm ? '✅ Found' : '❌ Not found');
            
            const signupForm = document.getElementById('signup-form');
            console.log('Signup form:', signupForm ? '✅ Found' : '❌ Not found');
            
            console.log('closeAuthModal function:', typeof closeAuthModal === 'function' ? '✅ Available' : '❌ Not available');
            console.log('switchTab function:', typeof switchTab === 'function' ? '✅ Available' : '❌ Not available');
            console.log('handleSignIn function:', typeof handleSignIn === 'function' ? '✅ Available' : '❌ Not available');
            console.log('handleSignUp function:', typeof handleSignUp === 'function' ? '✅ Available' : '❌ Not available');
        }

        // Auto-check on load
        window.addEventListener('load', function() {
            console.log('Page loaded, running auto-check...');
            setTimeout(checkElements, 1000);
        });
    </script>
</body>
</html>
