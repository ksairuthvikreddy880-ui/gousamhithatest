<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Products - Gousamhitha Admin</title>
    <link rel="stylesheet" href="admin-styles.css">
    <link rel="stylesheet" href="css/responsive.css">
    
    <!-- Supabase Client -->
    <script src="js/supabase-client.js?v=6"></script>
</head>
<body class="admin-page">
    <div class="admin-layout">
        <aside class="admin-sidebar">
            <div class="sidebar-header">
                <h2>Gousamhitha Admin</h2>
            </div>
            <nav class="sidebar-nav">
                <a href="admin-dashboard.html" class="nav-link">Dashboard</a>
                <a href="admin-products.html" class="nav-link active">Products</a>
                <a href="admin-add-product.html" class="nav-link">Add Product</a>
                <a href="admin-vendors.html" class="nav-link">Vendors</a>
                <a href="admin-orders.html" class="nav-link">Orders</a>
                <a href="admin-payouts.html" class="nav-link">Vendor Payouts</a>
                <a href="#" class="nav-link" onclick="adminLogout()">Logout</a>
            </nav>
        </aside>
        
        <main class="admin-content">
            <div class="content-header">
                <h1>Product Management</h1>
            </div>
            
            <div class="table-container">
                <table class="admin-table">
                    <thead>
                        <tr>
                            <th>Image</th>
                            <th>Name</th>
                            <th>Category</th>
                            <th>Price</th>
                            <th>Stock</th>
                            <th>Status</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="products-table-body">
                        
                    </tbody>
                </table>
            </div>
        </main>
    </div>

    <div class="edit-overlay" id="edit-overlay" onclick="closeEditPanel()"></div>
    
    <div class="edit-panel" id="edit-panel">
        <div class="edit-panel-header">
            <h2>Edit Product</h2>
            <button class="close-panel" onclick="closeEditPanel()">&times;</button>
        </div>
        <div class="edit-panel-content">
            <form id="edit-product-form" onsubmit="saveProductEdit(event)">
                <input type="hidden" id="edit-product-id">
                
                <div class="form-group">
                    <label>Product Name</label>
                    <input type="text" id="edit-name" required>
                </div>
                
                <div class="form-group">
                    <label>Category</label>
                    <select id="edit-category" required>
                        <option value="Fruits & Vegetables">Fruits & Vegetables</option>
                        <option value="Daily Staples">Daily Staples</option>
                        <option value="Snacks & More">Snacks & More</option>
                        <option value="Bakery & Dairy">Bakery & Dairy</option>
                        <option value="Home Food">Home Food</option>
                        <option value="Special Categories">Special Categories</option>
                        <option value="Conscious Living">Conscious Living</option>
                    </select>
                </div>
                
                <div class="form-group">
                    <label>Subcategory</label>
                    <input type="text" id="edit-subcategory" required>
                </div>
                
                <div class="form-group">
                    <label>Vendor</label>
                    <select id="edit-vendor">
                        <option value="">Select Vendor (Optional)</option>
                    </select>
                </div>
                
                <div class="form-group">
                    <label>Price (₹)</label>
                    <input type="number" id="edit-price" required min="0" step="0.01">
                </div>
                
                <div class="form-group">
                    <label>Stock Quantity</label>
                    <input type="number" id="edit-stock" required min="0">
                </div>
                
                <div class="form-group">
                    <label>Unit</label>
                    <select id="edit-unit" required>
                        <option value="kg">Kilogram (kg)</option>
                        <option value="g">Gram (g)</option>
                        <option value="l">Liter (l)</option>
                        <option value="ml">Milliliter (ml)</option>
                        <option value="piece">Piece</option>
                        <option value="pack">Pack</option>
                    </select>
                </div>
                
                <div class="form-group">
                    <label>Unit Quantity</label>
                    <input type="number" id="edit-unit-quantity" step="0.01" min="0">
                </div>
                
                <div class="form-group">
                    <label>Display Unit (e.g., "500g", "1L")</label>
                    <input type="text" id="edit-display-unit">
                </div>
                
                <div class="form-group">
                    <label>Description</label>
                    <textarea id="edit-description" rows="4" required></textarea>
                </div>
                
                <div class="form-group">
                    <label>Product Image</label>
                    <div class="current-image" id="edit-current-image"></div>
                    <input type="file" id="edit-image" accept="image/*">
                    <small>Leave empty to keep current image</small>
                </div>
                
                <div class="form-actions">
                    <button type="submit" class="btn-primary">Save Changes</button>
                    <button type="button" class="btn-secondary" onclick="closeEditPanel()">Cancel</button>
                </div>
            </form>
        </div>
    </div>
    
    <!-- Scripts -->
    <script>
        let editingProductId = null;
        let productChannel = null;

        // Wait for Supabase to be ready
        window.addEventListener('supabaseReady', async () => {
            console.log('✅ Supabase ready, loading products...');
            await loadProducts();
            await loadVendorsForDropdown();
            setupRealtimeSubscription();
        });
        
        // Also try after a delay
        setTimeout(async () => {
            if (window.supabase) {
                await loadProducts();
                await loadVendorsForDropdown();
                setupRealtimeSubscription();
            }
        }, 1000);

        function setupRealtimeSubscription() {
            productChannel = window.supabase
                .channel('products-channel')
                .on('postgres_changes', 
                    { event: '*', schema: 'public', table: 'products' },
                    (payload) => {
                        console.log('Product change detected:', payload);
                        loadProducts();
                    }
                )
                .subscribe();
            
            console.log('Realtime subscription active for products');
        }

        async function loadProducts() {
            const tbody = document.getElementById('products-table-body');
            tbody.innerHTML = '<tr><td colspan="7" style="text-align: center;">Loading products...</td></tr>';
            
            try {
                const { data: products, error } = await window.supabase
                    .from('products')
                    .select('*')
                    .order('created_at', { ascending: false });
                
                if (error) {
                    console.error('Error loading products:', error);
                    tbody.innerHTML = '<tr><td colspan="7" style="text-align: center; color: #d32f2f;">Error loading products</td></tr>';
                    return;
                }
                
                displayProducts(products || []);
            } catch (error) {
                console.error('Error loading products:', error);
                tbody.innerHTML = '<tr><td colspan="7" style="text-align: center; color: #d32f2f;">Error loading products</td></tr>';
            }
        }

        function displayProducts(products) {
            const tbody = document.getElementById('products-table-body');
            
            if (products.length === 0) {
                tbody.innerHTML = '<tr><td colspan="7" style="text-align: center;">No products found. Add your first product!</td></tr>';
                return;
            }

            tbody.innerHTML = products.map(product => {
                const imageUrl = product.image_url || 'data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 width=%22100%22 height=%22100%22%3E%3Crect fill=%22%23ddd%22 width=%22100%22 height=%22100%22/%3E%3Ctext fill=%22%23999%22 x=%2250%25%22 y=%2250%25%22 text-anchor=%22middle%22 dy=%22.3em%22%3ENo Image%3C/text%3E%3C/svg%3E';
                return `
                <tr>
                    <td><img src="${imageUrl}" alt="${product.name}" style="width:50px;height:50px;object-fit:cover;border-radius:5px;" onerror="this.src='data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 width=%22100%22 height=%22100%22%3E%3Crect fill=%22%23ddd%22 width=%22100%22 height=%22100%22/%3E%3Ctext fill=%22%23999%22 x=%2250%25%22 y=%2250%25%22 text-anchor=%22middle%22 dy=%22.3em%22%3ENo Image%3C/text%3E%3C/svg%3E'"></td>
                    <td>${product.name}</td>
                    <td>${product.category}</td>
                    <td>₹${product.price}</td>
                    <td>${product.stock}</td>
                    <td><span class="status-badge ${product.in_stock ? 'in-stock' : 'out-of-stock'}">${product.in_stock ? 'In Stock' : 'Out of Stock'}</span></td>
                    <td>
                        <button class="btn-edit" onclick="editProduct('${product.id}')">Edit</button>
                        <button class="btn-delete" onclick="deleteProduct('${product.id}')">Delete</button>
                    </td>
                </tr>
            `}).join('');
        }

        async function loadVendorsForDropdown() {
            try {
                const { data: vendors, error } = await window.supabase
                    .from('vendors')
                    .select('id, vendor_name, business_name')
                    .eq('status', 'active')
                    .order('vendor_name');
                
                if (error) throw error;
                
                const vendorSelect = document.getElementById('edit-vendor');
                vendorSelect.innerHTML = '<option value="">Select Vendor (Optional)</option>' +
                    (vendors || []).map(v => `<option value="${v.id}">${v.vendor_name} - ${v.business_name}</option>`).join('');
            } catch (error) {
                console.error('Error loading vendors:', error);
            }
        }

        async function editProduct(id) {
            try {
                const { data: product, error } = await window.supabase
                    .from('products')
                    .select('*')
                    .eq('id', id)
                    .single();
                
                if (error || !product) {
                    if (typeof showToast === 'function') {
                        showToast('Error loading product details', 'error');
                    }
                    return;
                }

                editingProductId = id;
                document.getElementById('edit-product-id').value = product.id;
                document.getElementById('edit-name').value = product.name;
                document.getElementById('edit-category').value = product.category;
                document.getElementById('edit-subcategory').value = product.subcategory || '';
                document.getElementById('edit-vendor').value = product.vendor_id || '';
                document.getElementById('edit-price').value = product.price;
                document.getElementById('edit-stock').value = product.stock;
                document.getElementById('edit-unit').value = product.unit || 'piece';
                document.getElementById('edit-unit-quantity').value = product.unit_quantity || '';
                document.getElementById('edit-display-unit').value = product.display_unit || '';
                document.getElementById('edit-description').value = product.description || '';
                
                const currentImageDiv = document.getElementById('edit-current-image');
                if (product.image_url) {
                    currentImageDiv.innerHTML = `<img src="${product.image_url}" alt="${product.name}" style="max-width: 200px; border-radius: 8px; margin-bottom: 10px;">`;
                } else {
                    currentImageDiv.innerHTML = '<p style="color: #999;">No image</p>';
                }
                
                document.getElementById('edit-panel').classList.add('active');
                document.getElementById('edit-overlay').classList.add('active');
            } catch (error) {
                console.error('Error loading product:', error);
                if (typeof showToast === 'function') {
                    showToast('Error loading product details', 'error');
                }
            }
        }

        function closeEditPanel() {
            document.getElementById('edit-panel').classList.remove('active');
            document.getElementById('edit-overlay').classList.remove('active');
            document.getElementById('edit-product-form').reset();
            editingProductId = null;
        }

        async function saveProductEdit(event) {
            event.preventDefault();

            const productData = {
                name: document.getElementById('edit-name').value.trim(),
                category: document.getElementById('edit-category').value,
                subcategory: document.getElementById('edit-subcategory').value.trim(),
                vendor_id: document.getElementById('edit-vendor').value || null,
                price: parseFloat(document.getElementById('edit-price').value),
                stock: parseInt(document.getElementById('edit-stock').value),
                unit: document.getElementById('edit-unit').value,
                unit_quantity: parseFloat(document.getElementById('edit-unit-quantity').value) || null,
                display_unit: document.getElementById('edit-display-unit').value.trim() || null,
                description: document.getElementById('edit-description').value.trim(),
                in_stock: parseInt(document.getElementById('edit-stock').value) > 0
            };

            try {
                const { error } = await window.supabase
                    .from('products')
                    .update(productData)
                    .eq('id', editingProductId);
                
                if (error) {
                    console.error('Error updating product:', error);
                    if (typeof showToast === 'function') {
                        showToast('Error updating product: ' + error.message, 'error');
                    }
                    return;
                }
                
                if (typeof showToast === 'function') {
                    showToast('Product updated successfully!', 'success');
                }

                setTimeout(async () => {
                    await loadProducts();
                    closeEditPanel();
                }, 1000);
            } catch (error) {
                console.error('Error saving product:', error);
                if (typeof showToast === 'function') {
                    showToast('Error saving product. Please try again.', 'error');
                }
            }
        }

        async function deleteProduct(id) {
            if (!confirm('Are you sure you want to delete this product? This action cannot be undone.')) {
                return;
            }

            try {
                const { error } = await window.supabase
                    .from('products')
                    .delete()
                    .eq('id', id);
                
                if (error) {
                    console.error('Error deleting product:', error);
                    if (typeof showToast === 'function') {
                        showToast('Error deleting product: ' + error.message, 'error');
                    }
                    return;
                }
                
                console.log('Product deleted successfully');
                if (typeof showToast === 'function') {
                    showToast('Product deleted successfully', 'success');
                }
                await loadProducts();
            } catch (error) {
                console.error('Error deleting product:', error);
                if (typeof showToast === 'function') {
                    showToast('Error deleting product. Please try again.', 'error');
                }
            }
        }

        async function adminLogout() {
            const confirmLogout = confirm('Are you sure you want to logout?');
            if (confirmLogout) {
                try {
                    const { error } = await window.supabase.auth.signOut();
                    if (error) throw error;
                    
                    localStorage.clear();
                    
                    window.location.replace('./index.html');
                } catch (error) {
                    console.error('Logout error:', error);
                    if (typeof showToast === 'function') {
                        showToast('Failed to logout. Please try again.', 'error');
                    }
                }
            }
        }
    </script>
    <script src="js/toast.js"></script>
</body>
</html>
